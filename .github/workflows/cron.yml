name: CornerEdge Cron — Snapshots e Verificação Automática

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Chamar endpoint /api/cron
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://corner0304.vercel.app/api/cron)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Cron falhou com status $HTTP_CODE"
            exit 1
          fi
